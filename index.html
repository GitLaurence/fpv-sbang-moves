<!DOCTYPE html>
<html lang="fil" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPV Freestyle Moves</title>

  <!-- Non-blocking Google Fonts load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  </noscript>

  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/sidebar.css" />
  <link rel="stylesheet" href="styles/controls.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/stick-cam.css" />
  <link rel="stylesheet" href="styles/hud.css" />
  <link rel="stylesheet" href="styles/ui.css" />
</head>
<body>

<!-- SVG icon sprite (inline so <use href="#..."> works cross-browser) -->
<svg aria-hidden="true" style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v14l11-7-11-7z"/></symbol>

  <symbol id="icon-skip-start" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></symbol>
  <symbol id="icon-skip-end" viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></symbol>
  <symbol id="icon-step-back" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm12 0L9.5 12 18 18V6z"/></symbol>
  <symbol id="icon-step-fwd" viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zM6 6v12l8.5-6z"/></symbol>
  <symbol id="icon-loop" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></symbol>
  <symbol id="icon-step" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></symbol>
  <symbol id="icon-volume" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></symbol>
  <symbol id="icon-mute" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19l2 2L21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></symbol>
  <symbol id="icon-ghost" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9v11l3-3 2 2 2-2 2 2 2-2 3 3V9c0-3.87-3.13-7-7-7zm-2.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></symbol>
  <symbol id="icon-camera" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.2A3.2 3.2 0 0 0 15.2 12 3.2 3.2 0 0 0 12 8.8 3.2 3.2 0 0 0 8.8 12 3.2 3.2 0 0 0 12 15.2zM9 3 7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2h-3.17L15 3H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></symbol>
  <symbol id="icon-gamepad" viewBox="0 0 24 24" fill="currentColor"><path d="M15 7.5V2H9v5.5l3 3 3-3zM7.5 9H2v6h5.5l3-3-3-3zM9 16.5V22h6v-5.5l-3-3-3 3zM16.5 9l-3 3 3 3H22V9h-5.5z"/></symbol>
  <symbol id="icon-settings" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.05 7.05 0 0 0-1.62-.94l-.36-2.54A.484.484 0 0 0 14 2h-4a.484.484 0 0 0-.48.41l-.36 2.54a7.418 7.418 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.47a.479.479 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.27.41.49.41h4c.22 0 .43-.17.47-.41l.36-2.54a7.418 7.418 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6S10.02 8.4 12 8.4s3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-12.37-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0zM7.05 18.36l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0z"/></symbol>
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></symbol>
  <symbol id="icon-filter" viewBox="0 0 24 24" fill="currentColor"><path d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.74-7.39A.998.998 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z"/></symbol>
  <symbol id="icon-menu" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></symbol>
</svg>

<!-- ── Intro Screen ──────────────────────────────────────── -->
<div id="intro-screen" role="status" aria-label="Loading">
  <div class="intro-logo">FPV FREESTYLE</div>
  <div class="intro-sub">MOVES TUTORIAL</div>
  <div class="intro-loader">
    <div class="intro-loader-bar" id="intro-bar"></div>
  </div>
</div>

<!-- ── App Shell ─────────────────────────────────────────── -->
<div id="app" role="main" hidden>

  <!-- ─ Sidebar ─────────────────────────────────────────── -->
  <nav id="sidebar" aria-label="Listahan ng moves">

    <div class="sidebar-header">
      <span class="sidebar-title">FREESTYLE</span>
      <button class="sidebar-icon-btn" id="btn-filter" aria-label="I-filter ang mga moves">
        <svg width="16" height="16"><use href="#icon-filter"/></svg>
      </button>
    </div>

    <div class="sidebar-scroll" id="move-list">
      <!-- populated by main.js -->
    </div>

  </nav>

  <!-- ─ Main Panels ─────────────────────────────────────── -->
  <div id="main">

    <!-- FPV Cam Header -->
    <header class="panel-header" id="fpv-header" aria-label="FPV camera panel">
      <div class="panel-label">
        <svg width="14" height="14"><use href="#icon-camera"/></svg>
        FPV CAM
      </div>
      <div class="panel-badge" id="fpv-badge">LIVE SIM</div>
      <div class="panel-badge" id="yt-badge" style="display:none;background:rgba(255,0,0,0.18);border-color:rgba(255,80,80,0.4);color:#ff8080">▶ YT VIDEO</div>
    </header>

    <!-- FPV Canvas -->
    <div class="canvas-wrap" id="fpv-wrap" role="img" aria-label="FPV camera view">
      <canvas id="fpv-canvas" aria-hidden="true"></canvas>
      <!-- YouTube video layer — shown instead of canvas when move has a video -->
      <div id="yt-container" aria-hidden="true"
        style="display:none;position:absolute;inset:0;z-index:2;background:#000;pointer-events:none">
        <div id="yt-player" style="width:100%;height:100%"></div>
      </div>
      <!-- OSD overlay canvas — drawn above the FPV scene / video -->
      <canvas id="osd-canvas" aria-hidden="true"
        style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4"></canvas>
      <!-- Placeholder before JS loads -->
      <div class="canvas-placeholder" id="fpv-placeholder">
        <svg width="40" height="40"><use href="#icon-camera"/></svg>
        <span>PILIIN ANG ISANG MOVE</span>
      </div>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle" role="separator" aria-orientation="vertical"
         aria-label="I-resize ang mga panel" tabindex="0"></div>

    <!-- Stick Cam Header -->
    <header class="panel-header" id="stick-header" aria-label="Stick cam panel">
      <div class="panel-label">
        <svg width="14" height="14"><use href="#icon-gamepad"/></svg>
        STICK CAM
      </div>
      <div class="panel-badge" id="stick-mode-badge">MODE 2</div>
    </header>

    <!-- Stick Canvas -->
    <div class="canvas-wrap" id="stick-wrap" role="img" aria-label="RC transmitter stick visualization">
      <canvas id="stick-canvas" aria-hidden="true"></canvas>
      <div class="canvas-placeholder" id="stick-placeholder">
        <svg width="40" height="40"><use href="#icon-gamepad"/></svg>
        <span>PILIIN ANG ISANG MOVE</span>
      </div>
    </div>

    <!-- Playback state announcements for screen readers -->
    <div id="sr-status" class="sr-only" aria-live="polite"></div>

    <!-- Move Info Panel -->
    <section id="move-info" aria-label="Impormasyon ng move" aria-live="polite">
      <div class="move-info-left">
        <div class="move-info-name" id="info-name">—</div>
        <div class="move-info-desc" id="info-desc"></div>
      </div>
      <div class="move-info-right">
        <div class="diff-dots" id="info-dots" aria-label="Difficulty"></div>
        <div class="move-card-duration" id="info-duration"></div>
      </div>
      <div class="move-info-tips" id="info-tips"></div>
    </section>

  </div><!-- /#main -->

  <!-- ─ Controls Bar ────────────────────────────────────── -->
  <footer id="controls" role="toolbar" aria-label="Playback controls">

    <!-- Transport -->
    <div class="ctrl-group" role="group" aria-label="Transport">
      <button class="ctrl-btn" id="btn-skip-start" aria-label="Bumalik sa simula" title="Simula (Home)">
        <svg><use href="#icon-skip-start"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-step-back" aria-label="Isang frame pabalik" title="Frame back (←)">
        <svg><use href="#icon-step-back"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-play" aria-label="I-play o i-pause" title="Play/Pause (Space)">
        <svg id="play-icon"><use href="#icon-play"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-step-fwd" aria-label="Isang frame pasulong" title="Frame forward (→)">
        <svg><use href="#icon-step-fwd"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-skip-end" aria-label="Pumunta sa dulo" title="Dulo (End)">
        <svg><use href="#icon-skip-end"/></svg>
      </button>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Scrubber -->
    <div class="scrubber-wrap" role="group" aria-label="Timeline">
      <div class="scrubber-track-wrap">
        <div class="scrubber-ticks" id="scrubber-ticks" aria-hidden="true"></div>
        <input type="range" id="scrubber"
          min="0" max="1000" value="0" step="1"
          aria-label="Playback position"
          aria-valuemin="0" aria-valuemax="1000" aria-valuenow="0"
          aria-valuetext="0 seconds" />
        <div class="scrubber-tooltip" id="scrubber-tooltip" aria-hidden="true">0.0s</div>
      </div>
      <div class="scrubber-time" aria-live="off">
        <span class="time-current" id="time-current">0:00.0</span>
        <span class="time-sep">/</span>
        <span class="time-total"   id="time-total">0:00.0</span>
      </div>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Speed -->
    <div class="ctrl-group">
      <div class="speed-group" role="group" aria-label="Bilis ng playback">
        <button class="speed-pill" data-speed="0.25" aria-pressed="false">0.25×</button>
        <button class="speed-pill" data-speed="0.5"  aria-pressed="false">0.5×</button>
        <button class="speed-pill active" data-speed="1" aria-pressed="true">1×</button>
        <button class="speed-pill" data-speed="2"  aria-pressed="false">2×</button>
      </div>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Toggles -->
    <div class="ctrl-group">
      <button class="ctrl-toggle" id="btn-loop" aria-pressed="false" aria-label="Loop mode" title="Loop (L)">
        <svg><use href="#icon-loop"/></svg>
      </button>
      <button class="ctrl-toggle" id="btn-step" aria-pressed="false" aria-label="Step mode" title="Step mode (⚡)">
        <svg><use href="#icon-step"/></svg>
      </button>
      <button class="ctrl-toggle" id="btn-mute" aria-pressed="false" aria-label="I-mute ang audio" title="Mute (M)">
        <svg><use href="#icon-volume"/></svg>
      </button>
      <button class="ctrl-toggle" id="btn-ghost" aria-pressed="false" aria-label="Ghost trail" title="Ghost Trail (G)">
        <svg><use href="#icon-ghost"/></svg>
      </button>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Theme -->
    <div class="ctrl-group">
      <button class="theme-btn active" data-theme="night"       aria-pressed="true">NIGHT</button>
      <button class="theme-btn"        data-theme="daylight"    aria-pressed="false">DAY</button>
      <button class="theme-btn"        data-theme="betaflight"  aria-pressed="false">BF OSD</button>
    </div>

  </footer>

</div><!-- /#app -->

<!-- Mobile move selector button -->
<button id="mobile-moves-btn" aria-label="Buksan ang listahan ng moves" aria-expanded="false">
  <svg width="22" height="22"><use href="#icon-menu"/></svg>
</button>

<script type="module" src="js/main.js"></script>
</body>
</html>
